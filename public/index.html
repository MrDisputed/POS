<!-- Mechanic Shop POS / Virtual Register -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<div id="app"></div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

:root{
  --bg:#080b0f; --bg2:#0e131a; --panel:#141b25; --panel2:#1c2531;
  --line:#28323f; --line2:#374659;
  --ink:#e9edf3; --muted:#8893a6; --faint:#5f6b7e;
  --amber:#88a2c4; --amber-d:#5a7295;
  --steel:#9fb8d6; --green:#46c97d; --green-d:#218a52;
  --red:#ef5d6b; --red-d:#c23c4a;
  --shadow:0 10px 30px rgba(0,0,0,.5);
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif; --disp:'Bebas Neue',sans-serif;
}
*{box-sizing:border-box}
html,body{background:#080b0f !important;color:#e9edf3;margin:0;padding:0;}
#app{
  font-family:var(--sans); color:#e9edf3;
  background:
    radial-gradient(900px 500px at 85% -10%, rgba(136,162,196,.07), transparent 60%),
    linear-gradient(180deg,#06080c,#080b0f 40%);
  min-height:100vh; padding:0; line-height:1.45;
}
#app *{font-family:inherit}
input,select,textarea,option{color:#e9edf3 !important;background-color:#0b0f15;}
option{background-color:#141b25;}
.wrap{max-width:1180px;margin:0 auto;padding:18px 18px 60px}
h1,h2,h3{margin:0;font-weight:700}
button{cursor:pointer;font-family:var(--sans)}
input,select{font-family:var(--sans)}
.mono{font-family:var(--mono)}

/* hazard top strip */
.hazard{height:6px;background:repeating-linear-gradient(45deg,var(--amber) 0 14px,#1a1c22 14px 28px)}

/* top bar */
.topbar{display:flex;align-items:center;gap:14px;padding:14px 18px;background:linear-gradient(180deg,#171a21,#13151b);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:46px;height:46px;border-radius:50%;overflow:hidden;display:grid;place-items:center;background:#000;border:1px solid var(--line2);flex:none}
.logo img{width:100%;height:100%;object-fit:cover;display:block}
.logo span{font-family:var(--disp);font-size:26px;color:var(--amber);line-height:1}
.brand .name{font-family:var(--disp);font-size:28px;letter-spacing:1.5px;line-height:.9}
.brand .sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.who{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:13px}
.who .pill{background:var(--panel2);border:1px solid var(--line2);padding:6px 12px;border-radius:999px;display:flex;gap:8px;align-items:center}
.who .role{color:var(--amber);font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:1px}
.btn{border:1px solid var(--line2);background:var(--panel2);color:var(--ink);padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;transition:.15s}
.btn:hover{border-color:var(--amber-d);color:#fff}
.btn.amber{background:linear-gradient(180deg,#a3bbd9,#7990b1);color:#0a0e14;border-color:#5a7295}
.btn.amber:hover{filter:brightness(1.07)}
.btn.green{background:linear-gradient(180deg,#46d586,#23a35f);color:#04220f;border-color:#1f9d59}
.btn.red{background:transparent;border-color:var(--red-d);color:var(--red)}
.btn.red:hover{background:rgba(255,93,93,.1)}
.btn.ghost{background:transparent}
.btn.sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* nav */
.nav{display:flex;gap:4px;padding:0 18px;background:#13151b;border-bottom:1px solid var(--line);overflow-x:auto}
.nav button{background:none;border:none;color:var(--muted);padding:13px 16px;font-size:13px;font-weight:600;border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:.3px}
.nav button:hover{color:var(--ink)}
.nav button.on{color:var(--amber);border-bottom-color:var(--amber)}

/* layout helpers */
.grid{display:grid;gap:16px}
.cols-2{grid-template-columns:1fr 1fr}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:880px){.cols-2,.cols-3,.cols-4{grid-template-columns:1fr}.register{grid-template-columns:1fr!important}}
.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
.card h3{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h3:before{content:"";width:8px;height:8px;background:var(--amber);border-radius:2px;transform:rotate(45deg)}
.sect-title{font-family:var(--disp);font-size:34px;letter-spacing:1px;margin-bottom:2px}
.sect-sub{color:var(--muted);font-size:13px;margin-bottom:18px}

/* stat tiles */
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;position:relative;overflow:hidden}
.stat:after{content:"";position:absolute;right:-20px;top:-20px;width:70px;height:70px;background:radial-gradient(circle,rgba(255,182,39,.08),transparent 70%)}
.stat .k{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
.stat .v{font-family:var(--mono);font-size:26px;font-weight:600;margin-top:6px}
.stat .v.green{color:var(--green)}
.stat .v.amber{color:var(--amber)}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:10px 10px;border-bottom:1px solid var(--line2);font-weight:600}
td{padding:11px 10px;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.02)}
.num{font-family:var(--mono);text-align:right}
.tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:6px}
.tag.paid{background:rgba(63,208,127,.14);color:var(--green)}
.tag.unpaid{background:rgba(255,93,93,.14);color:var(--red)}
.tag.low{background:rgba(255,182,39,.14);color:var(--amber)}
.tag.role{background:rgba(79,156,242,.14);color:var(--steel)}

/* forms */
label.f{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:0 0 6px}
.inp,select.inp{width:100%;background:var(--bg);border:1px solid var(--line2);color:var(--ink);padding:10px 12px;border-radius:8px;font-size:14px}
.inp:focus,select.inp:focus{outline:none;border-color:var(--amber-d);box-shadow:0 0 0 3px rgba(255,182,39,.1)}
.inp.mono{font-family:var(--mono)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row>div{flex:1;min-width:120px}

/* register */
.register{display:grid;grid-template-columns:1.3fr .9fr;gap:16px;align-items:start}
.cart-item{display:grid;grid-template-columns:1fr auto auto auto auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
.cart-item .nm{font-weight:600}
.cart-item .meta{font-size:11px;color:var(--muted);font-family:var(--mono)}
.qty{display:flex;align-items:center;gap:6px}
.qty button{width:26px;height:26px;border-radius:6px;border:1px solid var(--line2);background:var(--panel2);color:var(--ink);font-size:15px;line-height:1}
.qpick{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;max-height:320px;overflow:auto;padding-right:4px}
.qpick .item{text-align:left;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px;transition:.12s}
.qpick .item:hover{border-color:var(--amber-d);transform:translateY(-1px)}
.qpick .item .pn{font-weight:600;font-size:13px}
.qpick .item .pp{font-family:var(--mono);font-size:12px;color:var(--green);margin-top:3px}
.qpick .item .ps{font-size:10px;color:var(--muted);margin-top:2px}
.totline{display:flex;justify-content:space-between;padding:7px 0;font-size:14px}
.totline.big{border-top:1px solid var(--line2);margin-top:6px;padding-top:12px;font-size:20px;font-weight:700}
.totline .v{font-family:var(--mono)}
.commission-box{background:rgba(63,208,127,.07);border:1px solid rgba(63,208,127,.25);border-radius:9px;padding:10px 12px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.commission-box .v{font-family:var(--mono);color:var(--green);font-weight:700;font-size:18px}

/* login */
.login-shell{min-height:100vh;display:grid;place-items:center;padding:20px}
.login-card{width:100%;max-width:760px}
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.emp-tile{background:var(--panel2);border:1px solid var(--line2);border-radius:12px;padding:18px 14px;text-align:center;transition:.15s;cursor:pointer}
.emp-tile:hover{border-color:var(--amber);transform:translateY(-2px)}
.emp-tile .av{width:46px;height:46px;border-radius:50%;margin:0 auto 10px;display:grid;place-items:center;font-family:var(--disp);font-size:22px;background:linear-gradient(160deg,#2c3240,#1a1e27);border:1px solid var(--line2);color:var(--amber)}
.emp-tile .en{font-weight:700;font-size:15px}
.emp-tile .er{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--steel);margin-top:3px}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:14px auto 0}
.pinpad button{aspect-ratio:1.4;font-family:var(--mono);font-size:22px;border-radius:10px;border:1px solid var(--line2);background:var(--panel2);color:var(--ink)}
.pinpad button:hover{border-color:var(--amber-d)}
.pin-dots{display:flex;gap:12px;justify-content:center;margin:8px 0}
.pin-dots i{width:14px;height:14px;border-radius:50%;border:2px solid var(--line2);display:block}
.pin-dots i.on{background:var(--amber);border-color:var(--amber)}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(5,7,10,.72);display:grid;place-items:center;z-index:50;padding:18px;backdrop-filter:blur(3px)}
.modal{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line2);border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow:auto;box-shadow:var(--shadow)}
.modal .mh{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal .mh h3{font-family:var(--disp);font-size:24px;letter-spacing:.8px}
.modal .mb{padding:18px}
.modal .mf{padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.x{background:none;border:none;color:var(--muted);font-size:22px;line-height:1}
.x:hover{color:#fff}

.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
.empty .big{font-family:var(--disp);font-size:40px;color:var(--line2);letter-spacing:2px}
.bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.bar .grow{flex:1;min-width:160px}
.seg{display:inline-flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden}
.seg button{background:var(--panel2);border:none;color:var(--muted);padding:7px 14px;font-size:12px;font-weight:600}
.seg button.on{background:var(--amber);color:#0a0e14}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#11331d;border:1px solid var(--green-d);color:var(--green);padding:12px 20px;border-radius:10px;font-weight:600;font-size:14px;z-index:99;box-shadow:var(--shadow)}
small.hint{color:var(--muted);font-size:11px}
.flag{font-size:11px;color:var(--amber);margin-top:4px}
</style>

/* ---------------- storage (shared persistent, batched writes + retry) ---------------- */
const mem = {};
const API = 'api/kv/'; // served same-origin by the Node backend
const KEYS = {settings:'bbpos:settings', emps:'bbpos:emps', parts:'bbpos:parts', tx:'bbpos:tx', ledger:'bbpos:ledger', repairs:'bbpos:repairs', shifts:'bbpos:shifts', tabs:'bbpos:tabs'};

/* --- platform layer: only these two functions differ between the in-chat and VPS builds --- */
async function _loadKey(key){
  const r = await fetch(API+encodeURIComponent(key));
  if(!r.ok) return undefined;
  const d = await r.json();
  return (d && d.value!=null) ? d.value : undefined;
}
async function _saveKey(key, val){
  const r = await fetch(API+encodeURIComponent(key), {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:val})});
  if(!r || !r.ok) throw new Error('save failed: '+(r?r.status:'no response'));
}
/* --- end platform layer --- */

const _dirty = new Set();

  try{ const v = await _loadKey(key); if(v!==undefined){ mem[key]=v; return v; } }
  catch(e){}
  return (key in mem) ? mem[key] : fallback;
}
function sset(key, val){            // returns immediately; the actual write is coalesced + retried

}
function _scheduleFlush(delay){ if(_flushTimer) return; _flushTimer = setTimeout(_flush, delay||200); }

  }
  if(failed){
    _failStreak++;
    _scheduleFlush(Math.min(1000*_failStreak, 8000));   // back off, keep retrying
    if(_failStreak>=4 && !_warned){ _warned = true; try{ toast('Trouble saving — retrying. Check the connection if this persists.'); }catch(e){} }
  } else {
    _failStreak = 0; _warned = false;
  }
}

/* ---------------- calc ---------------- */
function upchargeRate(){ return (S.settings.upcharge!=null ? S.settings.upcharge : 20)/100; }
function calcTx(items, flats, mode, discountPct){
  const up = upchargeRate();
  let partsCost=0;
  items.forEach(i=>{ partsCost += (Number(i.qty)||1)*(Number(i.cost)||0); });
  const partsCharge = partsCost*(1+up);          // customer pays cost + upcharge
  const partsProfit = partsCharge - partsCost;   // the upcharge IS the profit
  const flatAmt = (flats||[]).reduce((s,l)=>s+(Number(l.amt)||0),0); // flat-rate service charges = pure profit
  const gross = partsCharge + flatAmt;           // before discount, no tax
  const dPct = Number(discountPct)||0;
  const discountAmt = gross*dPct/100;            // discount comes out of the bill (and out of profit)
  const total  = gross - discountAmt;
  const profit = (partsProfit + flatAmt) - discountAmt;
  // partsRev/laborAmt kept as field names for downstream views, with new meaning:
  return {partsCost, partsCharge, partsRev:partsCharge, partsProfit, flatAmt, laborAmt:flatAmt,
          gross, discountPct:dPct, discountAmt, subtotal:total, tax:0, total, profit};
}
function curDiscount(){ const d=(S.settings.discounts||[])[S.discountIdx]; return d||null; }
function curDiscountPct(){ const d=curDiscount(); return d? (Number(d.pct)||0) : 0; }
function cartCalc(){ return calcTx(S.cart, S.labor, S.mode, curDiscountPct()); }
function commissionRateFor(emp){
  if(emp && emp.commission!=null && emp.commission!=='') return (Number(emp.commission)||0)/100; // per-person override
  const trainee = (S.settings.commTrainee!=null?S.settings.commTrainee:40)/100;
  const other   = (S.settings.commOther!=null?S.settings.commOther:50)/100;
  return (emp && emp.role==='Apprentice') ? trainee : other;
}
function commissionFor(emp, c){
  return c.profit * commissionRateFor(emp);
}

  S.tx.forEach(t=>{const sid=(t.custSid||'').trim(), name=(t.custName||'').trim(), wallet=(t.custWallet||'').trim(); if(!sid&&!name)return;
    const k=(sid||name).toLowerCase();
    if(!map[k]){map[k]={name,sid,wallet,last:t.ts};}
    else{ if(t.ts>map[k].last){map[k].name=name||map[k].name; map[k].sid=sid||map[k].sid; map[k].wallet=wallet||map[k].wallet; map[k].last=t.ts;}
          if(name&&!map[k].name)map[k].name=name; if(sid&&!map[k].sid)map[k].sid=sid; if(wallet&&!map[k].wallet)map[k].wallet=wallet; }

/* ---------------- TABS (billing cycles) ---------------- */
function tabOrders(id){ return S.tx.filter(t=>t.tabId===id); }
function tabTotal(id){ return tabOrders(id).reduce((s,t)=>s+(Number(t.total)||0),0); }
function tabCycle(tb){
  const cycleMs=(Number(tb.cycleDays)||14)*86400000;
  const since=Date.now()-(tb.lastInvoiced||tb.createdTs||Date.now());
  const left=Math.ceil((cycleMs-since)/86400000);
  const due=since>=cycleMs;
  return {due, left, cycleDays:Number(tb.cycleDays)||14};
}

/* ---------------- PAYOUTS ---------------- */
function inPeriod(ts){
  const d=new Date(ts), now=new Date();
  if(S.period==='today') return d.toDateString()===now.toDateString();
  if(S.period==='week'){const wk=new Date(now);wk.setDate(now.getDate()-7);return d>=wk;}
  return true;
}
function viewPayouts(v){
  const tx=S.tx.filter(t=>inPeriod(t.ts));
  const rows=S.emps.map(e=>{
    const mine=tx.filter(t=>t.empId===e.id);
    const sales=mine.reduce((s,t)=>s+t.total,0);
    const profit=mine.reduce((s,t)=>s+(t.profit!=null?t.profit:(t.partsProfit||0)+(t.laborAmt||0)),0);
    const comm=mine.reduce((s,t)=>s+t.commission,0);
    return {e,count:mine.length,sales,profit,comm};
  }).sort((a,b)=>b.comm-a.comm);
  const totalComm=rows.reduce((s,r)=>s+r.comm,0);
  const totalSales=rows.reduce((s,r)=>s+r.sales,0);
  const shopProfit=rows.reduce((s,r)=>s+r.profit,0)-totalComm;
  v.innerHTML=`
    <div class="sect-title">Payouts</div>
    <div class="sect-sub">Commission owed per mechanic — pay to their bank #.</div>
    <div class="bar">
      <div class="seg">${[['today','Today'],['week','This week'],['all','All time']].map(p=>`<button data-period="${p[0]}" class="${S.period===p[0]?'on':''}">${p[1]}</button>`).join('')}</div>
    </div>
    <div class="grid cols-3" style="margin-bottom:16px">
      <div class="stat"><div class="k">Gross Sales</div><div class="v">${money(totalSales)}</div></div>
      <div class="stat"><div class="k">Total Commission</div><div class="v amber">${money(totalComm)}</div></div>
      <div class="stat"><div class="k">Shop Net Profit</div><div class="v green">${money(shopProfit)}</div></div>
    </div>
    <div class="card" style="padding:6px 16px">
      <table><thead><tr><th>Mechanic</th><th>Role</th><th>Bank #</th><th class="num">Jobs</th><th class="num">Sales</th><th class="num">Profit gen.</th><th class="num">Commission</th></tr></thead><tbody>
      ${rows.map(r=>`<tr>
        <td><b>${esc(r.e.name)}</b><div class="mono" style="font-size:11px;color:var(--muted)">SID ${esc(r.e.sid)}</div></td>
        <td><span class="tag role">${esc(r.e.role)}</span></td>
        <td class="mono">${esc(r.e.bank)}</td>
        <td class="num">${r.count}</td>
        <td class="num">${money(r.sales)}</td>
        <td class="num" style="color:var(--green)">${money(r.profit)}</td>
        <td class="num amber" style="color:var(--amber);font-weight:700">${money(r.comm)}</td>
      </tr>`).join('')}
      </tbody></table>
    </div>`;
}

/* ---------------- HOURS / TIMESHEET ---------------- */
function viewHours(v){
  const canManage=S.user.role==='Boss'||S.user.role==='Manager';
  const now=Date.now();
  const shifts=S.shifts.filter(s=>inPeriod(s.clockIn));
  const sum={};
  shifts.forEach(s=>{ const end=s.clockOut||now; const d=end-s.clockIn;
    if(!sum[s.empId])sum[s.empId]={name:s.empName,ms:0,count:0,open:false};
    sum[s.empId].ms+=d; sum[s.empId].count++; if(!s.clockOut)sum[s.empId].open=true; });
  const rows=Object.values(sum).sort((a,b)=>b.ms-a.ms);
  const log=[...shifts].sort((a,b)=>b.clockIn-a.clockIn);
  const onClock=S.shifts.filter(s=>!s.clockOut);
  const totalMs=rows.reduce((s,r)=>s+r.ms,0);
  const mine=rows.find(r=>S.user && sum[S.user.id]===r);
  const fmtT=ts=>new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  v.innerHTML=`
    <div class="sect-title">Hours</div>
    <div class="sect-sub">Clock-ins, time on the clock, and clock-outs. You're clocked in automatically when you log in.</div>
    <div class="bar">
      <div class="seg">${[['today','Today'],['week','This week'],['all','All time']].map(p=>`<button data-period="${p[0]}" class="${S.period===p[0]?'on':''}">${p[1]}</button>`).join('')}</div>
    </div>
    <div class="grid cols-3" style="margin-bottom:16px">
      <div class="stat"><div class="k">On the clock now</div><div class="v" style="color:var(--green)">${onClock.length}</div></div>
      <div class="stat"><div class="k">Total hours (period)</div><div class="v">${fmtDur(totalMs)}</div></div>
      <div class="stat"><div class="k">Your hours (period)</div><div class="v" style="color:var(--steel)">${fmtDur(sum[S.user.id]?sum[S.user.id].ms:0)}</div></div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <h3>By employee</h3>
      <table><thead><tr><th>Employee</th><th class="num">Shifts</th><th class="num">Total hours</th><th>Status</th></tr></thead><tbody>
      ${rows.length? rows.map(r=>`<tr>
        <td><b>${esc(r.name)}</b></td><td class="num">${r.count}</td><td class="num">${fmtDur(r.ms)}</td>
        <td>${r.open?'<span class="tag" style="background:rgba(70,201,125,.14);color:var(--green)">ON CLOCK</span>':'<span style="color:var(--muted)">off</span>'}</td>
      </tr>`).join('') : `<tr><td colspan="4"><div class="empty">No shifts in this period.</div></td></tr>`}
      </tbody></table>
    </div>
    <div class="card" style="padding:6px 16px">
      <table><thead><tr><th>Employee</th><th>Clock in</th><th>Clock out</th><th class="num">Duration</th>${canManage?'<th></th>':''}</tr></thead><tbody>
      ${log.length? log.map(s=>`<tr>
        <td>${esc(s.empName)}</td>
        <td style="font-size:12px;color:var(--muted)">${fmtT(s.clockIn)}</td>
        <td style="font-size:12px;color:var(--muted)">${s.clockOut?fmtT(s.clockOut):'<span style="color:var(--green)">— on the clock —</span>'}</td>
        <td class="num">${fmtDur((s.clockOut||now)-s.clockIn)}</td>
        ${canManage?`<td class="num">${!s.clockOut?`<button class="btn sm ghost" data-closeshift="${s.id}">Clock out</button> `:''}<button class="btn sm red" data-delshift="${s.id}">Del</button></td>`:''}
      </tr>`).join('') : `<tr><td colspan="${canManage?5:4}"><div class="empty"><div class="big" style="font-size:30px">NO SHIFTS</div><p>Clock-ins will appear here.</p></div></td></tr>`}
      </tbody></table>
    </div>
    ${canManage?'<small class="hint" style="display:block;margin-top:10px">Forgot to clock someone out? Use “Clock out” on their open shift to close it now.</small>':''}`;
}

/* ---------------- VEHICLES ---------------- */
function viewVehicles(v){
  const map={};
  S.tx.forEach(t=>{ const veh=(t.vehicle||'').trim(); if(!veh)return;
    const k=veh.toLowerCase();
    if(!map[k])map[k]={name:veh,jobs:0,partsRev:0,labor:0,total:0,parts:{},last:0};
    const g=map[k]; g.jobs++; g.partsRev+=t.partsRev||0; g.labor+=t.laborAmt||0; g.total+=t.total||0; g.last=Math.max(g.last,t.ts);
    (t.items||[]).forEach(it=>{ const nm=((it.name||'Part').trim())||'Part'; const qty=Number(it.qty)||1; const cost=Number(it.cost)||0;
      if(!g.parts[nm])g.parts[nm]={qty:0,total:0,jobs:0};
      g.parts[nm].qty+=qty; g.parts[nm].total+=qty*cost; g.parts[nm].jobs++; });
  });
  const vehicles=Object.values(map).sort((a,b)=>b.jobs-a.jobs);
  const totalParts=vehicles.reduce((s,x)=>s+x.partsRev,0);
  v.innerHTML=`
    <div class="sect-title">Vehicles</div>
    <div class="sect-sub">Every car you've worked on, with the parts used and what they cost — a baseline for next time.</div>
    <div class="grid cols-3" style="margin-bottom:16px">
      <div class="stat"><div class="k">Vehicles worked on</div><div class="v">${vehicles.length}</div></div>
      <div class="stat"><div class="k">Total jobs (with a vehicle)</div><div class="v">${vehicles.reduce((s,x)=>s+x.jobs,0)}</div></div>
      <div class="stat"><div class="k">Total parts billed</div><div class="v green">${money(totalParts)}</div></div>
    </div>
    ${vehicles.length? vehicles.map(g=>{
      const parts=Object.entries(g.parts).sort((a,b)=>b[1].total-a[1].total);
      return `<div class="card" style="margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px">
          <h3 style="margin:0">${esc(g.name)}</h3>
          <span class="tag role">${g.jobs} job${g.jobs>1?'s':''}</span>
          <div style="margin-left:auto;display:flex;gap:18px;font-size:13px" class="mono">
            <span style="color:var(--muted)">Parts <b style="color:var(--green)">${money(g.partsRev)}</b></span>
            <span style="color:var(--muted)">Labor <b>${money(g.labor)}</b></span>
            <span style="color:var(--muted)">Total <b>${money(g.total)}</b></span>
            <span style="color:var(--muted)">Avg/job <b>${money(g.total/g.jobs)}</b></span>
          </div>
        </div>
        ${parts.length?`<table><thead><tr><th>Part used</th><th class="num">Jobs</th><th class="num">Qty</th><th class="num">Cost</th><th class="num">Avg cost</th></tr></thead><tbody>
          ${parts.map(([nm,d])=>`<tr><td>${esc(nm)}</td><td class="num">${d.jobs}</td><td class="num">${d.qty}</td><td class="num">${money(d.total)}</td><td class="num" style="color:var(--muted)">${money(d.qty?d.total/d.qty:0)}</td></tr>`).join('')}
        </tbody></table>`:`<div style="color:var(--muted);font-size:13px">Labor only — no parts recorded for this vehicle.</div>`}
      </div>`;
    }).join('')
    : `<div class="card"><div class="empty"><div class="big" style="font-size:34px">NO VEHICLES YET</div><p>Add a vehicle make/model on the register and it'll show up here after the job is recorded.</p></div></div>`}`;
}

/* ---------------- ANALYTICS ---------------- */
function viewAnalytics(v){
  const tx=S.tx.filter(t=>inPeriod(t.ts));
  const led=S.ledger.filter(l=>inPeriod(l.ts));
  const sales=tx.reduce((s,t)=>s+t.total,0);
  const partsRev=tx.reduce((s,t)=>s+t.partsRev,0);
  const laborRev=tx.reduce((s,t)=>s+t.laborAmt,0);
  const cogs=tx.reduce((s,t)=>s+t.partsCost,0);
  const commission=tx.reduce((s,t)=>s+t.commission,0);
  const payroll=led.filter(l=>l.type==='Payroll').reduce((s,l)=>s+l.amount,0);
  const expenses=led.filter(l=>l.type==='Expense').reduce((s,l)=>s+l.amount,0);
  const otherIncome=led.filter(l=>l.type==='Income').reduce((s,l)=>s+l.amount,0);
  const incoming=sales+otherIncome;
  const outgoing=cogs+commission+payroll+expenses;
  const net=incoming-outgoing;
  const isBoss=S.user.role==='Boss';

  const rows=[];
  tx.forEach(t=>rows.push({ts:t.ts,kind:'Sale',dir:'in',label:(t.custName||'Walk-in')+' · '+t.no,sub:t.empName,amt:t.total}));
  led.forEach(l=>rows.push({ts:l.ts,kind:l.type,dir:l.type==='Income'?'in':'out',label:l.label,sub:l.empName||'',amt:l.amount,id:l.id}));
  rows.sort((a,b)=>b.ts-a.ts);

  const line=(lbl,val,color)=>`<div class="totline"><span>${lbl}</span><span class="v" ${color?`style="color:${color}"`:''}>${money(val)}</span></div>`;

  v.innerHTML=`
    <div class="sect-title">Analytics</div>
    <div class="sect-sub">Every dollar in and out — sales, parts cost, commission and payroll.</div>
    <div class="bar">
      <div class="seg">${[['today','Today'],['week','This week'],['all','All time']].map(p=>`<button data-period="${p[0]}" class="${S.period===p[0]?'on':''}">${p[1]}</button>`).join('')}</div>
      ${isBoss?`<button class="btn amber" data-act="newledger" style="margin-left:auto">+ Record payment</button>`:''}
    </div>
    <div class="grid cols-3" style="margin-bottom:16px">
      <div class="stat"><div class="k">Incoming</div><div class="v green">${money(incoming)}</div></div>
      <div class="stat"><div class="k">Outgoing</div><div class="v" style="color:var(--red)">${money(outgoing)}</div></div>
      <div class="stat"><div class="k">Net Profit</div><div class="v" style="color:${net>=0?'var(--green)':'var(--red)'}">${money(net)}</div></div>
    </div>
    <div class="grid cols-2" style="margin-bottom:16px">
      <div class="card">
        <h3>Money In</h3>
        ${line('Sales total',sales,'var(--green)')}
        <div class="totline" style="padding-left:14px;color:var(--muted)"><span>↳ Parts revenue</span><span class="v">${money(partsRev)}</span></div>
        <div class="totline" style="padding-left:14px;color:var(--muted)"><span>↳ Labor revenue</span><span class="v">${money(laborRev)}</span></div>
        ${line('Other income',otherIncome,'var(--green)')}
        <div class="totline big"><span>TOTAL IN</span><span class="v" style="color:var(--green)">${money(incoming)}</span></div>
      </div>
      <div class="card">
        <h3>Money Out</h3>
        ${line('Parts cost (COGS)',cogs,'var(--red)')}
        ${line('Commission',commission,'var(--red)')}
        ${line('Payroll',payroll,'var(--red)')}
        ${line('Other expenses',expenses,'var(--red)')}
        <div class="totline big"><span>TOTAL OUT</span><span class="v" style="color:var(--red)">${money(outgoing)}</span></div>
      </div>
    </div>
    <div class="card" style="padding:6px 16px">
      <table><thead><tr><th>Date</th><th>Type</th><th>Detail</th><th class="num">In</th><th class="num">Out</th>${isBoss?'<th></th>':''}</tr></thead><tbody>
      ${rows.length? rows.map(r=>`<tr>
        <td style="color:var(--muted);font-size:12px">${new Date(r.ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</td>
        <td><span class="tag" style="background:${r.dir==='in'?'rgba(70,201,125,.14)':'rgba(239,93,107,.14)'};color:${r.dir==='in'?'var(--green)':'var(--red)'}">${esc(r.kind)}</span></td>
        <td>${esc(r.label)}${r.sub?`<div style="font-size:11px;color:var(--muted)">${esc(r.sub)}</div>`:''}</td>
        <td class="num" style="color:var(--green)">${r.dir==='in'?money(r.amt):''}</td>
        <td class="num" style="color:var(--red)">${r.dir==='out'?money(r.amt):''}</td>
        ${isBoss?`<td class="num">${r.id?`<button class="btn sm red" data-delledger="${r.id}">Del</button>`:''}</td>`:''}
      </tr>`).join('')
      :`<tr><td colspan="${isBoss?6:5}"><div class="empty"><div class="big" style="font-size:30px">NO ACTIVITY</div><p>Sales and payments will show here.</p></div></td></tr>`}
      </tbody></table>
    </div>
    <small class="hint" style="display:block;margin-top:10px">Commission is tracked automatically from invoices. Payroll and expenses are payments you record with “+ Record payment”. Net profit = all income − parts cost − commission − payroll − expenses.</small>`;
}

          <div class="grid cols-2" style="margin:6px 0 14px;gap:10px">

        </select></div>
        <div><label class="f">Commission % override <span style="text-transform:none;color:var(--faint)">(blank = role default: 40% trainee / 50% other)</span></label><input class="inp mono" type="number" id="m-comm" value="${e.commission??''}"></div>

        <div style="flex:none;display:flex;align-items:center;gap:8px"><label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin:0"><input type="checkbox" id="m-resetpw" ${!e.id?'checked disabled':''}> ${e.id?'Reset password to default':'Starts with the default password'}</label></div>

    foot=`<button class="btn ghost" data-act="closemodal">Cancel</button><button class="btn amber" data-act="saveemp">Save</button>`;

  else if(m.type==='tx'){

    body=`<div class="row" style="margin-bottom:14px">

        <div><label class="f">Mechanic</label><div>${esc(t.empName)}</div></div>
        <div><label class="f">Type</label><div>${t.mode==='invoice'?'Invoice':'Charge'}</div></div>
      </div>
      ${(t.vehicle||t.custWallet)?`<div class="row" style="margin-bottom:14px">
        ${t.vehicle?`<div><label class="f">Vehicle</label><div>${esc(t.vehicle)}</div></div>`:''}
        ${t.custWallet?`<div><label class="f">Wallet ID</label><div class="mono">${esc(t.custWallet)}</div></div>`:''}
        <div><label class="f">Date</label><div>${new Date(t.ts).toLocaleString()}</div></div>
      </div>`:`<div style="margin-bottom:14px"><label class="f">Date</label><div>${new Date(t.ts).toLocaleString()}</div></div>`}
      <table><thead><tr><th>Item</th><th class="num">Qty</th><th class="num">Price</th><th class="num">Total</th></tr></thead><tbody>
        ${(t.items||[]).map(i=>`<tr><td>${esc(i.name)}</td><td class="num">${i.qty}</td><td class="num">${money(i.price!=null?i.price:i.unitPrice)}</td><td class="num">${money((i.qty||1)*(i.price!=null?i.price:i.unitPrice||0))}</td></tr>`).join('')}
        ${t.labor.filter(l=>l.amt).map(l=>`<tr><td>${esc(l.desc||'Labor')}</td><td class="num">—</td><td class="num">—</td><td class="num">${money(l.amt)}</td></tr>`).join('')}
      </tbody></table>
      ${t.tax?`<div class="totline"><span>Tax</span><span class="v">${money(t.tax)}</span></div>`:''}
      <div class="totline big" style="margin-top:6px"><span>TOTAL</span><span class="v">${money(t.total)}</span></div>
      <div class="totline"><span>Commission (${esc(t.empName)})</span><span class="v" style="color:var(--amber)">${money(t.commission)}</span></div>
      <div class="totline"><span>Payment</span><span class="v">${esc(t.payment)} · <span class="tag ${t.status==='Paid'?'paid':'unpaid'}">${t.status}</span></span></div>
      ${t.comment?`<div style="margin-top:10px;color:var(--muted);font-size:13px">“${esc(t.comment)}”</div>`:''}`;
    foot=`<button class="btn ghost" data-act="closemodal">Close</button>
      <button class="btn ${t.status==='Paid'?'red':'green'}" data-toggletx="${t.id}">Mark ${t.status==='Paid'?'Unpaid':'Paid'}</button>
      ${S.user.role==='Boss'?`<button class="btn red" data-voidtx="${t.id}">Void</button>`:''}`;
  }
  else if(m.type==='checkout'){
    const c=cartCalc();
    const isCharge=S.mode==='charge';
    const n=x=> String(+(+x).toFixed(2));
    title= isCharge?'Charge Customer':'Create Invoice';
    const fieldRow=(label,id,val,editable)=>`
      <label class="f" style="margin-top:12px">${label}</label>
      <div style="display:flex;gap:8px">
        <input class="inp mono" id="${id}" value="${esc(val)}" ${editable?'':'readonly'}>
        <button class="btn ghost sm" data-copy="${id}" style="flex:none">Copy</button>
      </div>`;
    const commentRow=(val)=>`
      <label class="f" style="margin-top:12px">Comment (full cost breakdown)</label>
      <div style="display:flex;gap:8px;align-items:flex-start">
        <textarea class="inp mono" id="co-comment" rows="3" style="resize:vertical">${esc(val)}</textarea>
        <button class="btn ghost sm" data-copy="co-comment" style="flex:none">Copy</button>
      </div>`;
    body = `<div style="color:var(--muted);font-size:13px;margin-bottom:4px">Paste each value into the in-game ${isCharge?'charge':'invoice'} window, then hit “Record” to log it here.</div>`
      + (isCharge
          ? fieldRow('State ID','co-sid',S.cust.sid)
            + fieldRow('Amount','co-amount',n(c.total))
            + commentRow(m.data.comment)
            + `<div class="flag" style="margin-top:10px;color:var(--muted)">Profit ${money(c.profit)} · your cut ${money(commissionFor(S.user,c))} · vehicle: ${esc(S.vehicle||'—')}</div>`
          : fieldRow('Wallet ID','co-wallet',S.cust.wallet||'')
            + fieldRow('State ID','co-sid',S.cust.sid)
            + fieldRow('Amount','co-amount',n(c.total))
            + commentRow(m.data.comment)
        );
    foot=`<button class="btn ghost" data-act="closemodal">Cancel</button><button class="btn green" data-act="recordtx">Record ${money(c.total)}</button>`;
  }
  else if(m.type==='ledger'){
    const l=m.data;
    title='Record Payment';
    body=`<label class="f">Type</label>
      <select class="inp" id="l-type">
        <option value="Payroll" ${l.type==='Payroll'?'selected':''}>Payroll — wage / salary paid to staff</option>
        <option value="Expense" ${l.type==='Expense'?'selected':''}>Expense — parts restock, rent, supplies…</option>
        <option value="Income" ${l.type==='Income'?'selected':''}>Other income — tow, deposit, misc…</option>
      </select>
      <div class="row" style="margin-top:12px">
        <div><label class="f">Amount</label><input class="inp mono" type="number" id="l-amount" value="${l.amount??''}" placeholder="0"></div>
        <div><label class="f">Date</label><input class="inp" type="date" id="l-date" value="${l.dateStr||new Date().toISOString().slice(0,10)}"></div>
      </div>
      <label class="f" style="margin-top:12px">Employee (for payroll)</label>
      <select class="inp" id="l-emp"><option value="">— none / N/A —</option>${S.emps.map(e=>`<option value="${e.id}" ${l.empId===e.id?'selected':''}>${esc(e.name)} · ${esc(e.role)}${e.bank?' · Bank '+esc(e.bank):''}</option>`).join('')}</select>
      <label class="f" style="margin-top:12px">Note / description</label>
      <input class="inp" id="l-label" placeholder="e.g. Weekly wages" value="${esc(l.label||'')}">`;
    foot=`<button class="btn ghost" data-act="closemodal">Cancel</button><button class="btn amber" data-act="saveledger">Save payment</button>`;
  }
  else if(m.type==='repair'){
    const r=m.data;
    title=r.id?'Edit Repair Entry':'New Repair Entry';
    const zones=[...new Set(S.repairs.map(x=>x.zone).filter(Boolean))];
    body=`<label class="f">Zone</label>
      <input class="inp" id="r-zone" list="r-zones" value="${esc(r.zone||'')}" placeholder="e.g. Engine Bay (bottom)">
      <datalist id="r-zones">${zones.map(z=>`<option value="${esc(z)}">`).join('')}</datalist>
      <label class="f" style="margin-top:12px">Part to fix</label>
      <input class="inp" id="r-part" value="${esc(r.part||'')}" placeholder="e.g. Oil Pan">
      <div class="row" style="margin-top:12px">
        <div><label class="f">Equipment</label>
          <input class="inp" id="r-equipment" value="${esc(r.equipment||r.mount||'')}" placeholder="e.g. Vehicle Lift"></div>
        <div><label class="f">Replace when</label>
          <input class="inp mono" id="r-replacewhen" value="${esc(r.replaceWhen||'')}" placeholder="e.g. < 30%"></div>
      </div>
      <label class="f" style="margin-top:12px">Tools needed</label>
      <input class="inp" id="r-tools" value="${esc(r.toolsText||(r.tools||[]).join(' / '))}" placeholder="Separate with  /  or commas — e.g. Gasket (consumed) / Socket Set">`;
    foot=`<button class="btn ghost" data-act="closemodal">Cancel</button><button class="btn amber" data-act="saverepair">Save entry</button>`;
  }
  else if(m.type==='transfer'){
    const ds=m.data.dataset||'full';
    title='Import / Export Data';
    const opts=[['full','Full backup (JSON)'],['emps','Employees (table)'],['parts','Parts (table)'],['invoices','Invoices (table)'],['repairs','Repairs (table)'],['bank','Bank transactions → ledger']];
    body=`<label class="f">Dataset</label>
      <select class="inp" id="tx-dataset">${opts.map(o=>`<option value="${o[0]}" ${ds===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select>
      <div style="margin-top:16px">
        <label class="f">Export — select all & copy out</label>
        <textarea class="inp mono" id="tx-export" rows="6" readonly style="resize:vertical">${esc(genExport(ds))}</textarea>
        <button class="btn ghost sm" data-act="copyexport" style="margin-top:8px">Copy to clipboard</button>
      </div>
      <div style="margin-top:18px;border-top:1px solid var(--line);padding-top:14px">
        <label class="f">Import — paste data here</label>
        <textarea class="inp mono" id="tx-import" rows="6" placeholder="Paste rows from a spreadsheet (header row + data, tab or comma separated) — or paste JSON…" style="resize:vertical"></textarea>
        <label style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:13px;color:var(--muted)"><input type="checkbox" id="tx-replace"> Replace existing instead of merging</label>
        <small class="hint" style="display:block;margin-top:6px">Columns are matched by header name. Employees: <b>name, sid, bank, role, commission</b>. Parts: <b>name, category, sku, cost, price</b>. Invoices: <b>date, customer, sid, mechanic, total, commission, payment</b>. Repairs: <b>zone, part, equipment, replacewhen, tools</b>. Bank: <b>date, amount, description, type</b> (negative amount or a debit/expense type = money out).</small>
      </div>`;
    foot=`<button class="btn ghost" data-act="closemodal">Close</button><button class="btn ghost" data-act="excelimport">Import Excel / CSV file…</button><button class="btn amber" data-act="transferimport">Import pasted data</button>`;
  }
  $app.insertAdjacentHTML('beforeend',`<div class="modal-bg" data-act="closebg"><div class="modal">
    <div class="mh"><h3>${title}</h3><button class="x" data-act="closemodal">×</button></div>
    <div class="mb">${body}</div><div class="mf">${foot}</div></div></div>`);
  if(m.type==='part') updateMarginFlag();
  bind();
}
function updateMarginFlag(){
  const f=document.getElementById('m-margin'); if(!f)return;
  const cost=+ (document.getElementById('m-cost')||{}).value||0;
  const taxPct=+ (document.getElementById('m-tax')||{}).value||0;
  const price=+ (document.getElementById('m-price')||{}).value||0;
  const landed=cost*(1+taxPct/100);
  const m=price-landed, pct=landed>0?Math.round(m/landed*100):0;
  f.textContent=`Cost incl. ${taxPct||0}% tax: ${money(landed)} · Margin: ${money(m)} (${pct}%)`;
  f.style.color = m>=0?'var(--green)':'var(--red)';
}

/* =============================================================== EVENT BINDING */
function bind(){
  // delegate clicks
  $app.onclick = async (ev)=>{
    const t=ev.target.closest('[data-tab],[data-act],[data-add],[data-inc],[data-dec],[data-rm],[data-pay],[data-mode],[data-period],[data-copy],[data-editpart],[data-delpart],[data-editemp],[data-delemp],[data-viewtx],[data-toggletx],[data-voidtx],[data-labor-rm],[data-flatbtn],[data-flat-rm],[data-disc-rm],[data-tab-invoice],[data-tab-archive],[data-tab-del],[data-tab-edit],[data-delledger],[data-editrepair],[data-delrepair],[data-closeshift],[data-delshift]');
    if(!t)return;
    const d=t.dataset;
    if(d.tab){S.view=d.tab;S.search='';render();return;}
    if(d.act==='closebg'){ if(ev.target.classList.contains('modal-bg')){S.modal=null;render();} return; }
    if(d.act) return handleAct(d.act);
    if(d.add!=null){ addToCart(d.add); return;}
    if(d.inc!=null){ S.cart[+d.inc].qty++; render(); return;}
    if(d.dec!=null){ const i=+d.dec; S.cart[i].qty--; if(S.cart[i].qty<=0)S.cart.splice(i,1); render(); return;}
    if(d.rm!=null){ S.cart.splice(+d.rm,1); render(); return;}
    if(d.flatRm!=null){ S.settings.flatRates.splice(+d.flatRm,1); sset(KEYS.settings,S.settings); render(); return;}
    if(d.discRm!=null){ S.settings.discounts.splice(+d.discRm,1); sset(KEYS.settings,S.settings); render(); return;}
    if(d.tabInvoice!=null){ const tb=S.tabs.find(x=>x.id===d.tabInvoice); if(tb){ tb.lastInvoiced=Date.now(); tb.history=tb.history||[]; tb.history.push({ts:Date.now(),total:tabTotal(tb.id)}); await sset(KEYS.tabs,S.tabs); render(); toast('Tab marked invoiced — cycle reset'); } return;}
    if(d.tabArchive!=null){ const tb=S.tabs.find(x=>x.id===d.tabArchive); if(tb){ tb.archived=!tb.archived; await sset(KEYS.tabs,S.tabs); render(); } return;}
    if(d.tabDel!=null){ if(confirm('Delete this tab? Jobs stay but lose their tab link.')){ S.tabs=S.tabs.filter(x=>x.id!==d.tabDel); await sset(KEYS.tabs,S.tabs); render(); } return;}
    if(d.laborRm!=null){ S.labor.splice(+d.laborRm,1); render(); return;}
    if(d.flatbtn!=null){ const f=(S.settings.flatRates||[])[+d.flatbtn]; if(f){
        const part=Number(f.part)||0, labour=Number(f.labour)||0;
        if(part>0){ const ex=S.cart.find(c=>c.name===f.label && c.cost===part); if(ex) ex.qty=(Number(ex.qty)||1)+1; else S.cart.push({name:f.label,cost:part,qty:1}); }
        if(labour>0){ const empty=S.labor.findIndex(l=>!l.desc&&!l.amt); const line={desc:f.label,amt:labour}; if(empty>=0)S.labor[empty]=line; else S.labor.push(line); }
        render();
      } return;}
    if(d.pay){ S.payment=d.pay; render(); return;}
    if(d.mode){ S.mode=d.mode; render(); return;}
    if(d.copy!=null){ const el=document.getElementById(d.copy); if(el){el.focus();el.select&&el.select();try{await navigator.clipboard.writeText(el.value!=null?el.value:el.textContent);}catch(e){try{document.execCommand('copy');}catch(_){}} toast('Copied'); } return;}
    if(d.period){ S.period=d.period; render(); return;}
    if(d.editpart){ const p=S.parts.find(x=>x.id===d.editpart); S.modal={type:'part',data:{...p}}; render(); return;}
    if(d.delpart){ if(confirm('Delete this part?')){S.parts=S.parts.filter(x=>x.id!==d.delpart);await sset(KEYS.parts,S.parts);render();} return;}
    if(d.editemp){ const e=S.emps.find(x=>x.id===d.editemp); S.modal={type:'emp',data:{...e}}; render(); return;}
    if(d.delemp){ if(confirm('Remove this employee?')){S.emps=S.emps.filter(x=>x.id!==d.delemp);await sset(KEYS.emps,S.emps);render();} return;}
    if(d.viewtx){ const tx=S.tx.find(x=>x.id===d.viewtx); S.modal={type:'tx',data:tx}; render(); return;}
    if(d.toggletx){ const tx=S.tx.find(x=>x.id===d.toggletx); tx.status=tx.status==='Paid'?'Unpaid':'Paid'; await sset(KEYS.tx,S.tx); S.modal={type:'tx',data:tx}; render(); return;}
    if(d.voidtx){ if(confirm('Void this invoice?')){S.tx=S.tx.filter(x=>x.id!==d.voidtx);await sset(KEYS.tx,S.tx);S.modal=null;render();toast('Invoice voided');} return;}
    if(d.delledger){ if(confirm('Delete this payment entry?')){S.ledger=S.ledger.filter(x=>x.id!==d.delledger);await sset(KEYS.ledger,S.ledger);render();} return;}
    if(d.closeshift){ const sh=S.shifts.find(x=>x.id===d.closeshift); if(sh&&!sh.clockOut){sh.clockOut=Date.now(); if(S.currentShiftId===sh.id)S.currentShiftId=null; await sset(KEYS.shifts,S.shifts);render();} return;}
    if(d.delshift){ if(confirm('Delete this shift record?')){S.shifts=S.shifts.filter(x=>x.id!==d.delshift);await sset(KEYS.shifts,S.shifts);render();} return;}
    if(d.editrepair){ const r=S.repairs.find(x=>x.id===d.editrepair); S.modal={type:'repair',data:{...r,toolsText:(r.tools||[]).join(' / ')}}; render(); return;}
    if(d.delrepair){ if(confirm('Delete this repair entry?')){S.repairs=S.repairs.filter(x=>x.id!==d.delrepair);await sset(KEYS.repairs,S.repairs);render();} return;}
  };
  // Enter-to-submit on login / change-password
  $app.onkeydown = (ev)=>{
    if(ev.key!=='Enter')return;
    const id=ev.target.id;
    if(id==='login-sid'||id==='login-pw'){ev.preventDefault();doLogin();}
    else if(id==='pw-new'||id==='pw-confirm'){ev.preventDefault();doChangePw();}
  };
  // live inputs
  $app.oninput = (ev)=>{
    const id=ev.target.id, ds=ev.target.dataset;
    if(ds.perm){ const [role,sec]=ds.perm.split('|'); S.settings.perms=S.settings.perms||{}; S.settings.perms[role]=Object.assign({}, DEFAULT_PERMS[role], S.settings.perms[role]); S.settings.perms[role][sec]=ev.target.checked?1:0; sset(KEYS.settings,S.settings); return; }
    if(id==='tx-dataset'){ if(S.modal)S.modal.data.dataset=ev.target.value; updateExportBox(); return; }
    if(id==='login-sid'){ S.loginSid=ev.target.value; return; }
    if(id==='rep-zone'){ S.repZone=ev.target.value; S.repPart=''; render(); return; }
    if(id==='rep-part'){ S.repPart=ev.target.value; render(); return; }
    if(id==='cust-name'){S.cust.name=ev.target.value; autofillCustomer('name');}
    else if(id==='cust-sid'){S.cust.sid=ev.target.value; autofillCustomer('sid');}
    else if(id==='cust-wallet'){S.cust.wallet=ev.target.value;}
    else if(id==='veh'){S.vehicle=ev.target.value;}
    else if(id==='job-title'){S.jobTitle=ev.target.value;}
    else if(id==='job-notes'){S.jobNotes=ev.target.value;}
    else if(id==='job-tab'){S.tabId=ev.target.value;}
    else if(id==='job-discount'){S.discountIdx=parseInt(ev.target.value); render();}
    else if(id==='flat-search'){S.flatSearch=ev.target.value; render(); restoreFocus('flat-search');}
    else if(ds.partName!=null){S.cart[+ds.partName].name=ev.target.value;}
    else if(ds.partQty!=null){S.cart[+ds.partQty].qty=parseFloat(ev.target.value)||'';updateRegisterTotals();}
    else if(ds.partCost!=null){S.cart[+ds.partCost].cost=parseFloat(ev.target.value)||0;updateRegisterTotals();}
    else if(id==='part-search'||id==='inv-search'){S.search=ev.target.value; if(S.view==='register'){const c=document.querySelector('.qpick');} render(); restoreFocus(id);}
    else if(ds.laborDesc!=null)S.labor[+ds.laborDesc].desc=ev.target.value;
    else if(ds.laborAmt!=null){S.labor[+ds.laborAmt].amt=parseFloat(ev.target.value)||0; updateRegisterTotals();}
    else if(ds.flatLabel!=null){S.settings.flatRates[+ds.flatLabel].label=ev.target.value; sset(KEYS.settings,S.settings);}
    else if(ds.flatPart!=null){S.settings.flatRates[+ds.flatPart].part=parseFloat(ev.target.value)||0; sset(KEYS.settings,S.settings);}
    else if(ds.flatLabour!=null){S.settings.flatRates[+ds.flatLabour].labour=parseFloat(ev.target.value)||0; sset(KEYS.settings,S.settings);}
    else if(ds.discLabel!=null){S.settings.discounts[+ds.discLabel].label=ev.target.value; sset(KEYS.settings,S.settings);}
    else if(ds.discPct!=null){S.settings.discounts[+ds.discPct].pct=parseFloat(ev.target.value)||0; sset(KEYS.settings,S.settings);}
    else if(['m-cost','m-price','m-tax'].includes(id))updateMarginFlag();
  };
}
function updateRegisterTotals(){
  if(S.view!=='register')return;
  const c=cartCalc();
  const comm=commissionFor(S.user,c);
  const set=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=val;};
  set('t-pcost',money(c.partsCost));
  set('t-parts',money(c.partsCharge));
  set('t-labor',money(c.flatAmt));
  set('t-profit',money(c.profit));
  set('t-total',money(c.total));
  set('t-comm',money(comm));
  const dr=document.getElementById('disc-row'); if(dr){ if(c.discountAmt){ dr.style.display=''; dr.querySelector('span').textContent='Discount ('+c.discountPct+'%)'; set('t-disc','−'+money(c.discountAmt)); } else dr.style.display='none'; }
  const btn=document.getElementById('btn-charge');
  if(btn){btn.textContent=(S.mode==='charge'?'Charge ':'Create invoice ')+money(c.total);btn.disabled=(c.total<=0);}
}
let focusId=null,focusLabor=null;
function restoreFocus(id,labor){ focusId=id;focusLabor=labor; setTimeout(()=>{
  if(id){const el=document.getElementById(id);if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}}
  else if(labor!=null){const el=document.querySelector(`[data-labor-amt="${labor}"]`);if(el)el.focus();}
},0);}

async function doLogin(){
  const sid=((document.getElementById('login-sid')||{}).value||'').trim();
  const pw=((document.getElementById('login-pw')||{}).value||'');
  S.loginSid=sid;
  if(!sid||!pw){S.loginErr='Enter your State ID and password.';renderLogin();return;}
  const e=S.emps.find(x=>(x.sid||'').trim().toLowerCase()===sid.toLowerCase());
  if(!e || e.password!==pw){S.loginErr='Invalid State ID or password.';renderLogin();return;}
  S.loginErr='';
  if(!e.pwChanged){ S.changePw=e; S.pwErr=''; renderLogin(); return; }

function jobComment(){
  const c=cartCalc();
  const up=S.settings.upcharge||20;
  const lines=[];
  S.cart.forEach(p=>{ if(!p.name && !p.cost) return; const qty=Number(p.qty)||1; const cost=Number(p.cost)||0;
    const charge=cost*qty*(1+up/100);
    lines.push(qty>1 ? `${p.name||'Part'} (${qty} x ${money(cost)} +${up}%) = ${money(charge)}` : `${p.name||'Part'} ${money(charge)}`); });
  S.labor.forEach(l=>{ if(!l.amt) return; lines.push(`${l.desc||'Charge'} ${money(l.amt)}`); });
  const head='TorqueWorks'+(S.jobTitle?` — ${S.jobTitle}`:'')+(S.vehicle?` — ${S.vehicle}`:'');
  const totals=[];
  if(c.partsCharge) totals.push('Parts '+money(c.partsCharge));
  if(c.flatAmt) totals.push('Flat-rate '+money(c.flatAmt));
  if(c.discountAmt){ const d=curDiscount(); totals.push((d?d.label:'Discount')+' −'+money(c.discountAmt)); }
  totals.push('TOTAL '+money(c.total));
  return `${head} | ${lines.join(', ')||'—'} | ${totals.join(', ')}`;
}

async function persistAll(){await sset(KEYS.settings,S.settings);await sset(KEYS.emps,S.emps);await sset(KEYS.parts,S.parts);await sset(KEYS.tx,S.tx);await sset(KEYS.ledger,S.ledger);await sset(KEYS.repairs,S.repairs);await sset(KEYS.shifts,S.shifts);await sset(KEYS.tabs,S.tabs);}
function tsv(cols, rows){return [cols.join('\t')].concat(rows.map(r=>cols.map(c=>r[c]==null?'':String(r[c])).join('\t'))).join('\n');}
function genExport(ds){
  if(ds==='full') return JSON.stringify({settings:S.settings,emps:S.emps,parts:S.parts,tx:S.tx,ledger:S.ledger,repairs:S.repairs,shifts:S.shifts,tabs:S.tabs},null,2);
  if(ds==='repairs') return tsv(['zone','part','equipment','replacewhen','tools'],
    S.repairs.map(r=>({zone:r.zone,part:r.part,equipment:r.equipment||r.mount||'',replacewhen:r.replaceWhen||'',tools:(r.tools||[]).join(' / ')})));
  if(ds==='emps') return tsv(['name','sid','bank','role','commission'],
    S.emps.map(e=>({name:e.name,sid:e.sid,bank:e.bank,role:e.role,commission:e.commission==null?'':e.commission})));
  if(ds==='parts') return tsv(['name','category','sku','cost','taxpct','price'],
    S.parts.map(p=>({name:p.name,category:p.category||'',sku:p.sku||'',cost:p.cost,taxpct:p.taxPct||0,price:p.price})));
  if(ds==='invoices') return tsv(['no','date','customer','sid','mechanic','parts','labor','total','commission','payment','status'],
    S.tx.map(t=>({no:t.no,date:new Date(t.ts).toISOString(),customer:t.custName||'',sid:t.custSid||'',mechanic:t.empName,parts:t.partsRev,labor:t.laborAmt,total:t.total,commission:t.commission,payment:t.payment,status:t.status})));
  return '';
}

function splitRow(line,delim){
  if(delim==='\t')return line.split('\t');
  const out=[];let cur='',q=false;
  for(let i=0;i<line.length;i++){const ch=line[i];
    if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}
    else if(ch===','&&!q){out.push(cur);cur='';}
    else cur+=ch;}
  out.push(cur);return out;
}
function parseTable(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim()!=='');
  if(!lines.length)return [];
  const delim=lines[0].includes('\t')?'\t':',';
  const headers=splitRow(lines[0],delim).map(h=>h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
  return lines.slice(1).map(l=>{const c=splitRow(l,delim);const o={};headers.forEach((h,i)=>o[h]=(c[i]||'').trim());return o;});
}
const pick=(o,keys)=>{for(const k of keys){if(o[k]!=null&&o[k]!=='')return o[k];}return '';};
function mergeBy(existing, incoming, keyFn){
  const map=new Map(existing.map(x=>[keyFn(x),x]));
  incoming.forEach(n=>{const k=keyFn(n);if(map.has(k))n.id=map.get(k).id;map.set(k,n);});
  return [...map.values()];
}
async function doTransferImport(){
  const ds=(document.getElementById('tx-dataset')||{}).value||'full';
  const text=((document.getElementById('tx-import')||{}).value||'').trim();
  const replace=!!(document.getElementById('tx-replace')||{}).checked;
  if(!text){toast('Paste some data first');return;}
  const isJson=text[0]==='{'||text[0]==='[';
  try{
    if(ds==='full'){
      const d=JSON.parse(text);
      if(d.settings)S.settings=d.settings;if(d.emps)S.emps=d.emps;if(d.parts)S.parts=d.parts;if(d.tx)S.tx=d.tx;if(d.ledger)S.ledger=d.ledger;if(d.repairs)S.repairs=d.repairs;if(d.shifts)S.shifts=d.shifts;if(d.tabs)S.tabs=d.tabs;
      await persistAll();return finishImport('Full backup imported');
    }
    const rows = isJson ? (Array.isArray(JSON.parse(text))?JSON.parse(text):[JSON.parse(text)]) : parseTable(text);
    await importRows(ds, rows, replace, isJson);
  }catch(err){toast('Could not read that data — check the format');}
}
function normRow(o){ const r={}; for(const k in o){ const nk=String(k).toLowerCase().replace(/[^a-z0-9]/g,''); let v=o[k]; v=(v instanceof Date)?v.toISOString():(v==null?'':String(v)); r[nk]=v.trim?v.trim():v; } return r; }
function doExcelImport(){
  if(typeof XLSX==='undefined'){toast('Excel reader not loaded — paste the data instead');return;}
  const ds=(document.getElementById('tx-dataset')||{}).value||'full';
  if(ds==='full'){toast('Pick a dataset (Bank, Parts, etc.) for Excel import');return;}
  const replace=!!(document.getElementById('tx-replace')||{}).checked;
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.xlsx,.xls,.csv';
  inp.onchange=e=>{ const f=e.target.files[0]; if(!f)return; const rd=new FileReader();
    rd.onload=async ()=>{ try{
      const wb=XLSX.read(rd.result,{type:'array',cellDates:true});
      const sheet=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(sheet,{defval:''});
      const rows=raw.map(normRow);
      await importRows(ds, rows, replace, false);
    }catch(err){toast('Could not read that file');} };
    rd.readAsArrayBuffer(f); };
  inp.click();
}
async function importRows(ds, rows, replace, isJson){
  if(ds==='emps'){
    const mapped=rows.map(r=>({id:uid(),
      name:pick(r,['name','fullname','employee','employeename']),
      sid:pick(r,['sid','stateid','state','statesid','playerid']),
      bank:pick(r,['bank','banknumber','bankno','bankaccount','account','bankid']),
      role:pick(r,['role','position','rank'])||'Mechanic',
      password:pick(r,['password','pass','pw'])||S.settings.defaultPassword,
      pwChanged:false,
      commission:(()=>{const c=pick(r,['commission','comm','rate']);return c===''?null:parseFloat(c);})()
    })).filter(e=>e.name);
    S.emps=replace?mapped:mergeBy(S.emps,mapped,e=>(e.sid||e.name).toLowerCase());
    await sset(KEYS.emps,S.emps);return finishImport(mapped.length+' employee(s) imported');
  }
  if(ds==='parts'){
    const mapped=rows.map(r=>({id:uid(),
      name:pick(r,['name','part','partname','item','description','product']),
      category:pick(r,['category','cat','type','zone','section']),
      sku:pick(r,['sku','code','partnumber','partno','itemid']),
      cost:parseFloat(pick(r,['cost','buy','buyprice','purchase','purchaseprice','wholesale']))||0,
      taxPct:parseFloat(pick(r,['taxpct','tax','purchasetax','taxrate','vat']))||0,
      price:(()=>{ const given=parseFloat(pick(r,['price','sell','sellprice','retail','msrp','saleprice']));
        const cost=parseFloat(pick(r,['cost','buy','buyprice','purchase','purchaseprice','wholesale']))||0;
        return (given||given===0)&&!isNaN(given)&&given>0 ? given : Math.round(cost*(1+(S.settings.upcharge||20)/100)); })()
    })).filter(p=>p.name);
    S.parts=replace?mapped:mergeBy(S.parts,mapped,p=>(p.sku||p.name).toLowerCase());
    await sset(KEYS.parts,S.parts);return finishImport(mapped.length+' part(s) imported');
  }
  if(ds==='invoices'){
    let mapped;
    if(isJson){
      mapped=rows.map(t=>Object.assign({id:uid(),no:t.no||'INV',ts:t.ts||Date.now(),empName:t.empName||'Imported',
        items:t.items||[],labor:t.labor||[],partsRev:t.partsRev||0,partsCost:t.partsCost||0,partsProfit:t.partsProfit||0,
        laborAmt:t.laborAmt||0,profit:(t.profit!=null?t.profit:(t.partsProfit||0)+(t.laborAmt||0)),tax:t.tax||0,total:t.total||0,commission:t.commission||0,payment:t.payment||'Bank',status:t.status||'Paid'},t));
    } else {
      mapped=rows.map((r,i)=>{
        const total=parseFloat(pick(r,['total','amount','grandtotal','price','cost']))||0;
        const commRaw=pick(r,['commission','comm','payout']);
        const dateStr=pick(r,['date','time','timestamp','datetime']);
        const ts=dateStr?(Date.parse(dateStr)||Date.now()):Date.now();
        return {id:uid(),no:pick(r,['no','invoice','invoiceno','number','id'])||('INV-'+String(S.tx.length+i+1).padStart(4,'0')),ts,
          mode:'invoice',empId:'',empName:pick(r,['mechanic','employee','staff','worker','tech'])||'Imported',
          custName:pick(r,['customer','customername','client','name']),custSid:pick(r,['sid','stateid','customersid']),custWallet:pick(r,['wallet','walletid']),
          items:[],labor:[{desc:'Imported total',amt:total}],
          partsRev:0,partsCost:0,partsProfit:0,laborAmt:total,profit:total,tax:0,total,
          commission:commRaw===''?0:(parseFloat(commRaw)||0),
          payment:pick(r,['payment','method'])||'Bank',status:pick(r,['status'])||'Paid'};
      });
    }
    S.tx=replace?mapped:S.tx.concat(mapped);
    await sset(KEYS.tx,S.tx);return finishImport(mapped.length+' invoice(s) imported');
  }
  if(ds==='bank'){
    const mapped=rows.map(r=>{
      const raw=pick(r,['amount','amt','value','total','debit','credit']);
      const amt=parseFloat(String(raw).replace(/[^0-9.\-]/g,''))||0;
      const dateStr=pick(r,['date','time','timestamp','datetime','posted']);
      const ts=dateStr?(Date.parse(dateStr)||Date.now()):Date.now();
      const desc=pick(r,['description','label','memo','note','details','reference','comment','name'])||'Bank transaction';
      const typeCol=(pick(r,['type','direction','category','drcr'])||'').toLowerCase();
      let type;
      if(/credit|deposit|income|received|in$/.test(typeCol)) type='Income';
      else if(/debit|withdraw|expense|paid|purchase|out$/.test(typeCol)) type='Expense';
      else type = amt<0 ? 'Expense' : 'Income';
      return {id:uid(), type, amount:Math.abs(amt), label:desc, empId:'', empName:'', ts, source:'bank'};
    }).filter(x=>x.amount>0);
    S.ledger=replace?mapped:S.ledger.concat(mapped);
    await sset(KEYS.ledger,S.ledger);return finishImport(mapped.length+' bank transaction(s) imported');
  }
  if(ds==='repairs'){
    const mapped=rows.map(r=>{
      let tools=[];
      ['tool1','tool2','tool3','tool4','tool5','tool6'].forEach(k=>{if(r[k])tools.push(r[k]);});
      if(!tools.length){const t=pick(r,['tools','tool','toolsneeded','toolsparts']); if(t)tools=t.split(/[\/,]+/).map(s=>s.trim()).filter(Boolean);}
      return {id:uid(),
        zone:pick(r,['zone','area','section','selectazone']),
        part:pick(r,['part','parttofix','partname','component','item','selectaparttofix']),
        equipment:pick(r,['equipment','mount','mountneeded','lift']),
        replaceWhen:pick(r,['replacewhen','replace','threshold','when']),
        mount:pick(r,['equipment','mount','mountneeded','lift']),
        tools};
    }).filter(x=>x.zone&&x.part);
    S.repairs=replace?mapped:mergeBy(S.repairs,mapped,r=>(r.zone+'|'+r.part).toLowerCase());
    await sset(KEYS.repairs,S.repairs);return finishImport(mapped.length+' repair entr(ies) imported');
  }
}
function finishImport(msg){ if(S.user)render(); else renderLogin(); toast(msg); }

boot();
})();
</script>
